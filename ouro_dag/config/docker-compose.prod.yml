version: '3.8'

services:
  ouro-validator:
    image: ouroboros/node:mainnet-v1.0.0
    container_name: ouro-validator
    restart: unless-stopped
    ports:
      - "443:443"       # HTTPS API
      - "9001:9001"     # P2P
      - "9091:9091"     # BFT
      - "9090:9090"     # Prometheus metrics
    volumes:
      - ouro-data:/var/lib/ouro
      - ./certs:/etc/ssl/certs/ouro:ro
      - ./keys:/etc/ssl/private/ouro:ro
      - ./config:/etc/ouro/config:ro
    environment:
      - NODE_ID=${NODE_ID}
      - BFT_SECRET_SEED=${BFT_SECRET_SEED}
      - API_KEYS=${API_KEYS}
      - NODE_WALLET_ADDRESS=${NODE_WALLET_ADDRESS}
      - RUST_LOG=info
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:443/health", "-k"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - ouro-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  ouro-oracle:
    image: ouroboros/oracle-node:mainnet-v1.0.0
    container_name: ouro-oracle
    restart: unless-stopped
    ports:
      - "8081:8081"     # Oracle API
      - "9091:9091"     # Prometheus metrics
    volumes:
      - ouro-oracle-data:/var/lib/ouro-oracle
      - ./config:/etc/ouro/config:ro
    environment:
      - ORACLE_OPERATOR_ID=${ORACLE_OPERATOR_ID}
      - NODE_ENDPOINT=http://ouro-validator:443
      - RUST_LOG=info
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - ouro-network
    depends_on:
      - ouro-validator
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:latest
    container_name: ouro-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - ouro-network

  grafana:
    image: grafana/grafana:latest
    container_name: ouro-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - ouro-network
    depends_on:
      - prometheus

volumes:
  ouro-data:
    driver: local
  ouro-oracle-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ouro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
