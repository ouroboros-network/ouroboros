name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev llvm-dev
      - name: Build
        run: |
          cd ouro_dag
          cargo build --release --bin ouro_dag
      - name: Package
        run: |
          cd ouro_dag/target/release
          cp ouro_dag ouro_dag-linux-x64
          chmod +x ouro_dag-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ouro_dag-linux-x64
          path: ouro_dag/target/release/ouro_dag-linux-x64

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libclang-dev llvm-dev
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          cd ouro_dag
          cargo build --release --bin ouro_dag --target aarch64-unknown-linux-gnu
      - name: Package
        run: |
          cd ouro_dag/target/aarch64-unknown-linux-gnu/release
          cp ouro_dag ouro_dag-linux-arm64
          chmod +x ouro_dag-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ouro_dag-linux-arm64
          path: ouro_dag/target/aarch64-unknown-linux-gnu/release/ouro_dag-linux-arm64

  build-macos-x64:
    runs-on: macos-13  # Intel Mac
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          cd ouro_dag
          cargo build --release --bin ouro_dag
      - name: Package
        run: |
          cd ouro_dag/target/release
          cp ouro_dag ouro_dag-macos-x64
          chmod +x ouro_dag-macos-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ouro_dag-macos-x64
          path: ouro_dag/target/release/ouro_dag-macos-x64

  build-macos-arm64:
    runs-on: macos-14  # Apple Silicon Mac
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          cd ouro_dag
          cargo build --release --bin ouro_dag
      - name: Package
        run: |
          cd ouro_dag/target/release
          cp ouro_dag ouro_dag-macos-arm64
          chmod +x ouro_dag-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ouro_dag-macos-arm64
          path: ouro_dag/target/release/ouro_dag-macos-arm64

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install LLVM
        run: choco install llvm -y
      - name: Build
        run: |
          cd ouro_dag
          cargo build --release --bin ouro_dag
      - name: Package
        run: |
          cd ouro_dag/target/release
          copy ouro_dag.exe ouro_dag-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ouro_dag-windows-x64
          path: ouro_dag/target/release/ouro_dag-windows-x64.exe

  release:
    needs: [build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ouro_dag-linux-x64/ouro_dag-linux-x64
            artifacts/ouro_dag-linux-arm64/ouro_dag-linux-arm64
            artifacts/ouro_dag-macos-x64/ouro_dag-macos-x64
            artifacts/ouro_dag-macos-arm64/ouro_dag-macos-arm64
            artifacts/ouro_dag-windows-x64/ouro_dag-windows-x64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
